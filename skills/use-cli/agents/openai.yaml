interface:
  display_name: "CLI"
  short_description: "Connect CLI to Claude, Codex, and ChatGPT through JoAi's hosted MCP app server."
  icon_small: "https://raw.githubusercontent.com/JoAiHQ/assets/refs/heads/main/apps/logos/cli-black.svg"
  icon_large: "https://raw.githubusercontent.com/JoAiHQ/assets/refs/heads/main/apps/logos/cli-black.svg"
  brand_color: "#000000"
  default_prompt: "List the CLI tools available in this app."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "joai-cli"
      description: "CLI MCP server by JoAi"
      transport: "streamable_http"
      url: "https://cortex.joai.ai/mcp/apps/cli"
